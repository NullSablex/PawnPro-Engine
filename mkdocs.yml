site_name: PawnPro Engine
site_description: Motor LSP para a linguagem Pawn
site_url: https://nullsablex.github.io/PawnPro-Engine/
repo_url: https://github.com/NullSablex/PawnPro-Engine
repo_name: NullSablex/PawnPro-Engine
edit_uri: edit/master/docs/

docs_dir: docs

nav:
  - Introdução: index.md
  - Diagnósticos: diagnostics.md
  - Protocolo LSP: lsp.md

theme:
  name: material
  language: pt
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: light blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Mudar para modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: light blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Mudar para modo claro
  logo: icon.svg
  favicon: icon.svg
  features:
    - navigation.instant
    - navigation.top
    - search.highlight
    - search.suggest
    - content.action.edit
    - content.code.copy

plugins:
  - search:
      lang: pt

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html
