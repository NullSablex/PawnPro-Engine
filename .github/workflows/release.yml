name: Release Engine

on:
  push:
    tags:
      - 'v*.*.*'

permissions: {}

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: pawnpro-engine-linux-x64
            use_cross: false

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: pawnpro-engine-linux-arm64
            use_cross: true

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: pawnpro-engine-win32-x64.exe
            use_cross: false

          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: pawnpro-engine-darwin-x64
            use_cross: false

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: pawnpro-engine-darwin-arm64
            use_cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Install musl-tools (Linux x64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y --no-install-recommends musl-tools

      - name: Install cross (Linux arm64)
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build with cross
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build with cargo
        if: '!matrix.use_cross'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/pawnpro-engine ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Prepare binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item "target\${{ matrix.target }}\release\pawnpro-engine.exe" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 1
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: dist/
          merge-multiple: true

      - name: Generate SHA-256 checksums
        run: |
          cd dist
          sha256sum * > checksums.sha256
          echo "--- checksums ---"
          cat checksums.sha256

      - name: Create Release and upload binaries
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
