name: Release Engine

on:
  push:
    tags:
      - 'v*.*.*'

permissions: {}

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: pawnpro-engine-linux-x64
            use_cross: false

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: pawnpro-engine-linux-arm64
            use_cross: true

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: pawnpro-engine-win32-x64.exe
            use_cross: false

          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: pawnpro-engine-darwin-x64
            use_cross: false

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: pawnpro-engine-darwin-arm64
            use_cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Install musl-tools (Linux x64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y --no-install-recommends musl-tools

      - name: Install cross (Linux arm64)
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build with cross
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build with cargo
        if: '!matrix.use_cross'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/pawnpro-engine ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Prepare binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item "target\${{ matrix.target }}\release\pawnpro-engine.exe" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 1
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist/
          merge-multiple: true

      - name: Generate SHA-256 checksums
        run: |
          cd dist
          sha256sum * > checksums.sha256
          echo "--- checksums ---"
          cat checksums.sha256

      - name: Build release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          # 1. Seção curada do CHANGELOG.md (cabeçalho "## [VERSÃO] - data"),
          # aparando linhas em branco e separador "---" do fim.
          BODY=$(awk "/^## \[?v?${VERSION}\]?/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md \
            | awk '{lines[NR]=$0} END{n=NR; while(n>0 && (lines[n] ~ /^[[:space:]]*$/ || lines[n] ~ /^---[[:space:]]*$/)) n--; for(i=1;i<=n;i++) print lines[i]}')
          if [ -z "$BODY" ]; then
            BODY="Consulte o [CHANGELOG.md](CHANGELOG.md) para detalhes."
          fi

          # 2. Notas automáticas — só o bloco "New Contributors" e o link
          # "Full Changelog"; a categorização auto é descartada.
          AUTO=$(gh api -X POST "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$TAG" -q .body 2>/dev/null || echo "")
          APPENDIX=$(echo "$AUTO" | sed -n '/^## New Contributors$/,$p')
          if [ -z "$APPENDIX" ]; then
            APPENDIX=$(echo "$AUTO" | grep '^\*\*Full Changelog\*\*' | tail -1)
          fi

          {
            echo "$BODY"
            if [ -n "$APPENDIX" ]; then
              printf '\n---\n\n%s\n' "$APPENDIX"
            fi
          } > release_body.md

          cat release_body.md

      - name: Create Release and upload binaries
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: dist/*
          body_path: release_body.md
          fail_on_unmatched_files: true
