name: Scorecard

# Avalia boas práticas de segurança do repositório (branch protection, deps
# pinadas, fluxo de tokens, etc.) e publica o resultado no painel da OpenSSF.

on:
  branch_protection_rule:
  schedule:
    - cron: '30 5 * * 1'
  push:
    branches: [master]

permissions: {}

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@99c09fe975337306107572b4fdf4db224cf8e2f2 # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@1a818fd5f97ed0ee9a823421bd5b171add01227f # v4.36.2
        with:
          sarif_file: results.sarif
