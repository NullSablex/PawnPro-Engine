name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check, Clippy & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --all-targets

      - name: Rustfmt
        run: cargo fmt --all --check

      - name: Clippy (pedantic, warnings as errors)
        run: cargo clippy --all-targets -- -W clippy::pedantic -D warnings

      - name: Test
        run: cargo test

      # Verifica que o build de release compila sem erros
      # (lto + strip + codegen-units=1 definidos em [profile.release] do Cargo.toml)
      - name: Build release
        run: cargo build --release

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      # Falha se houver vulnerabilidade conhecida nas dependências (RustSec).
      - name: Audit dependencies
        run: cargo audit
